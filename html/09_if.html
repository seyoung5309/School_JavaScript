<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let age = +prompt("나이를 입력하세요 : ");
        let money = 0;
        if (age > 6 && age < 12) {
            money = 450;
        } else if (age < 18) {
            money = 700;
        } else if (age < 70) {
            money = 1000;
        }
        console.log(money);
    </script>
</body>
