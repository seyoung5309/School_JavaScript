<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //for ~ in : 객체에서 많이 사용, 배열에서 사용할 경우 다음과 같은 조건문과 초기화, 증가문이 없어도 문장을 전부 순회한다. 
        let brands = ["애플", "구글", "마이크로소프트", "삼성", "아마존", "테슬라"];
        for (const i in brands) {
            console.log(i);
            console.log(brands[i]);
        }
    </script>
</body>

</html>
