<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /* 배열
            - 하나 이상의 데이터를 담을 수 있다.
            - 순서가 있다.
            - []를 이용해서 할당
            - 어떤 데이터 타입도 올 수 있다.
            - 어떤 데이터 타입도 함께 올 수 있다. 
        */

        let num = [1, 3, 12, 4, 67, -89, 12.345];
        let str = ['a', 'b', 'c'];
        let mix = [1, "a", 3, true, { name: "ㅇㅇㅇ" }, [1, 2, 3, 4, 5]];

        console.log(num);
        console.log(str);
        console.log(mix);

        // 1. 속성 : property length
        console.log(num.length);
        console.log(str.length);
        console.log(mix.length);

        // 2. 인덱스 : [], 0부터, 배열의 순서는 항상 지켜진다. 
        for (let i = 0; i < mix.length; i++) {
            console.log(mix[i]);
        }

        // 3. 요소 수정
        num[5] = 89;
        console.log(num);

        // 4. 다양한 내장 함수 지원 
        // pop(value) 가장 마지막에 값을 반환 - 후입선출력
        console.log("pop() 사용 : ", mix.pop());
        console.log("pop() 사용 : ", mix.pop());
        // push() 가장 마지막에 값을 추가 - 후입선출력
        num.push(530);
        console.log(num);

        // 5. 배열과 객체의 활용
        // 예시: 개발한 시스템에서 사용자 목록을 읽어온다고 가정할 때
        let userList = [
            {
                name: "정국",
                gender: "남자",
                email: "jung@gmail.com",
                phone: "000-1111-1111"
            },
            {
                name: "뷔",
                gender: "남자",
                email: "vui@gmail.com",
                phone: "010-2222-1111"
            },
            {
                name: "로제",
                gender: "여자",
                email: "rose@gmail.com",
                phone: "010-3333-1111"
            }
        ];

        let user1 = userList[0];
        let user2 = userList[1];
        let user3 = userList[2];

        user3.name;
        console.log(user3.email);


    </script>
</body>

</html>
