<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        // for (const brand in brands) {
        //     console.log(brand);
        // } 결과 : 0, 1, 2, 3, 4, 5 <- 인덱스가 나옴.

        // for ~ of : 배열, 문자열에서 많이 사용
        // 1. 배열 
        let brands = ["애플", "구글", "마이크로소프트", "삼성", "아마존", "테슬라"];
        for (const brand of brands) {
            console.log(brand);
        }

        // 2. 문자열
        let lang = "javaScript";
        for (const char of lang) {
            console.log(char);
        }

        // 3. 숫자 
        let nums = 12345;
        for (const num of String(nums)) {
            console.log(num);
        }
        console.log("\n");

        for (const num of nums.toString()) {
            console.log(num);
        }
        console.log("\n");

        for (const num of nums+' ') {
            console.log(num);
        }
    </script>
</body>
</html>
