<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let brands = ["아이폰", "구글", "마이크로소프트", "삼성", "아마존", "테슬라"];

        //for~in : 객체에서 많이 사용, 배열에서 사용할 경우 => 초기화, 조건, 증가식
        for(const i in brands){
            //i : 인덱스
            console.log(i);
            console.log(brands[i]);
        }
    </script>
</body>
</html>
