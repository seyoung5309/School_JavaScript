<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. 할당 연산자 
        let x = 1;
        let y = x;

        x = x + y; // 2
        console.log(x)
        x = x - y;
        x = x * y;

        x = 5;
        y = 2;
        let z = x ** y;
        console.log(z);

        // 2. 복합할당 연산자 
        x = 3;
        y = 4;

        console.log((x += y));
        console.log((x -= y));
        console.log((x *= y));
        console.log((x /= y));
        console.log((x %= y));

        // 3. 
    </script>
</body>

</html>
