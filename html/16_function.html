      // 4. Function()
      //숫자 2개, 연산자를 입력 받아 연산을 실행하는 함수(calculator)를 작성해보자
      let n1 = 9;
      let n2 = 63;
      let op = "+"; //+, -, *, /, %

      console.log("===== 연산");
      console.log(calculator(n1, n2, op));
      console.log(calculator(n1, n2, "-"));
      console.log(calculator(n1, n2, "*"));
      console.log(calculator(n1, n2, "/"));
      console.log(calculator(n1, n2, "%"));

      function calculator(n1, n2, op) {
        if (op === "+") {
          return n1 + n2;
        } else if (op === "-") {
          return n1 - n2;
        } else if (op === "*") {
          return n1 * n2;
        } else if (op === "/") {
          return n1 / n2;
        } else if (op === "%") {
          return n1 % n2;
        } else {
          return "연산자가 잘못되었습니다.";
        }
      }
