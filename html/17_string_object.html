<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // String 내장 함수
      // 1. 속성(property) : length, indexOf

      let str = "Welcome Seoul";
      console.log(str.length);

      // 2. indexOf(대상, 시작위치) : 찾고자 하는 문자열의 시작 인덱스 리턴(여러개라면 첫 글자)
      console.log(str.indexOf("Seoul"));

      str = "Welcome Seoul Seoul";
      console.log(str.indexOf("Seoul", str.indexOf("Seoul") + 1));
      console.log(str.indexOf("Juju")); // 찾고자 하는 대상이 없다면 -1을 리턴

      // 활용 : 전화번호 입력 시 -없이 입력 => -가 있다면 입력 형식 오류났다고 메시지
      let tel = "010-0000-0000";
      //   tel = "01012345678";
      if (tel.indexOf("-") !== -1) {
        console.log("입력 형식이 잘못되었습니다.");
      }

      // 3. lastIndexOf() : 뒤에서부터 문자열을 찾아서 리턴(여러 개라면 첫 문자열) <=> indexOf
      console.log(str.lastIndexOf("Seoul"));
      //   console.log(str.lastIndexOf("Seoul", str.lastIndexOf("Seoul") - 1));

      // 4. (중요) slice() : 문자열을 (시작위치, 마지막 위치 - 1) 만큼 잘라내기
      // (가장 늦게 나온 내장함수)
      str = "Welcome Seoul";
      console.log(str.slice(8, 13));
      console.log(str.slice(-5, -2));
      //   console.log(str.slice(str.indexOf("Seoul"), str.length));

      // 5. substring() : 문자열을 (시작위치, 마지막 위치-1) 만큼 잘라내기
      // -n, 뒤에서부터 진행하는 인덱스는 지원하지 않는다. 위치가 음수라면 0으로 바꾼다.
      str = "Welcome Seoul";
      console.log(str.substring(8, 13));
      console.log(str.substring(8));
      console.log(str.substring(-5)); // == str.substring(0) | Welcome Seoul
      console.log(str.substring(-5, -2)); // == 지원하지 않음. 출력 X

      // 6. substr() : 문자열을 (시작위치, 길이)만큼 잘라내기
      // 길이를 명확히 아는 경우 매우 효율적
      let nowDate = "20260420";
      let year = nowDate.substr(0, 4);
      let month = nowDate.substr(4, 2);
      let day = nowDate.substr(6, 2);
      console.log(year, month, day);

      /* slice vs substring vs substr
          substring : slice와 유사하지만 인덱스가 음수인 경우 처리가 다르다.
          substr : 인덱스가 아닌 글자 수를 기준으로 하지만 현재 웹 표준으로 권장하지 않는다.
      */

      // 7. replace(str1, str2) : str1을 str2로 교체하는 함수
      str = "Welcome Jeju! Jeju";
      while (str.indexOf("Jeju") != -1) {
        str = str.replace("Jeju", "Seoul");
      }
      console.log(str);

      // 정규식(regular expression) : 특정한 포맷을 맞출 때

      // (중요) 8. toUpperCase() : 대문자로 변환
      // (중요) 9. toLowerCase() : 소문자로 변환
      // 입력된 내용을 대(소)문자로 변환한다.

      console.log(str.toUpperCase());
      console.log(str.toLowerCase());

      // 10. concat() : 여러 열 합치기, 합칠 문자열의 갯수에는 제한이 없다.
      let fristName = "John";
      let lastName = "Doe";
      let fullName = fristName.concat(" ", lastName, ". ", "Nice to Meet you");
      console.log(fullName);

      // 11. trim() : 문자열의 앞, 뒤 공백 없애기
      // const middleTrim = () => {};
      let name = "        에이스? 2학년 1반 ";
      console.log(name.trim().middleTrim);

      // 12. (매우 중요) padStart(문자열 전체 길이, 채울 문자열) : 현업에서 가장 많이 사용하는 함수 중 하나
      // 특정 문자로 앞을 채둔다.
      // month = prompt();
      console.log(month.padStart(2, "0"));
      // if (month > 0 && month < 13) {
      //   if (month < 10) {
      //     console.log("0" + String(month));
      //   } else {
      //     console.log(month);
      //   }
      // } else {
      //   console.log("범위를 초과하였습니다.");
      // }

      // 13. padEnd(문자열 전체 길이, 채울 문자열) : 거의 사용하지 않는다.

      // 14. charAt(인덱스) : 인덱스에 해당하는 글자 하나를 리턴
      str = "A000001";
      if (str.charAt(0) === "A") {
        console.log("안녕하세요. 관리자님");
      }

      // 15. charCodeAt(인덱스) : 인덱스에 해당하는 글자 유니코드를 리턴
      str = "힣";
      console.log(str.charCodeAt(0));
      str = "가";
      console.log(str.charCodeAt(0));
      str = "A000001";
      console.log(str.charCodeAt(0));

      // 16. split() : 파리미터로 전달받은 문자열을 기준으로 문자열을 쪼갠다.
      let emails = "s2525@e-mirim.hs.kr,leenight5309@naver.com";
      let email = emails.split(","); // 서버로부어 json형식으로 이메일이 전송되어 온다고 가정하자.
      console.log(email); //( = return 타입은 배열이다.)

      // 17. ** startsWith() : 파라미터로 시작하는지 여부를 boolean으로 반환
      let url = "website.com";
      console.log(url.startsWith("https://"));
      if (url.startsWith("https://")) {
        console.log("유효하다.");
      } else {
        console.log("유효하지 않다.");
      }

      // https:// 위의 주소가 적절한 웹 사이트 주소인지 팔별해보기. => 코드
      let url_input = prompt();
      if (url_input) {
        if (url_input.indexOf("https://") === 0) {
          console.log("유효한 웹 사이트 주소입니다.", url_input);
        } else if (url_input.indexOf("http://") === 0) {
          console.log("유효한 웹 사이트 주소입니다.", url_input);
        } else {
          console.log("유효하지 않은 웹 사이트 주소입니다.");
        }
      } else {
        console.log("웹 사이트 주소를 입력해주세요.");
      }

      // 18. endsWith() : 파라미터로 종료하는지 여부를 boolean으로 반환
    </script>
  </body>
</html>
