<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. 문자열(String)
        let name1 = "2학년 1반";
        let name2 = '2학년 1반';

        let str1 = "너희는 '2학년 1반'이야."
        console.log(str1);

        let str2 = '너희는 "2학년 1반"이야';
        console.log(str2);

        let str3 = "너희는 \"2학년 1반\"이야."; // escape 문자 
        console.log(str3);

        // 문자열 합치기 
        let first_name = "John";
        let last_name = "Bacon";
        let full_name = first_name + last_name;
        console.log(full_name);

        /* 숫자형(Number 객체)
        - 정수, 실수, 0 다 포함...
        - 다양한 속성과 함수 (메서드)가 제공됨
        - 특징 : 다른 언어와 달리 64비트 부동소수점 형식을 사용한다. => 연산 시 오류가 발생 가능함.
        */

        let num1 = 13;
        let num2 = 13.8;
        let result = 0.1 + 0.2;
        if (result === 0.3) {
            console.log("정답");
        } else {
            console.log("오답");
        }
        console.log(result); // 정밀도 오차 

        /* 정밀도 오차 해결 방법 
            1. 정수로 변환 후 게산 : (0.1 * 10 + 0.2 * 10) / 10;
            2. toFixed() 사용 : (0.1 + 0.2).toFixed(1);
            3. 다양한 라이브러리 사용 (현업) : 
        */

        console.log((0.1 * 10 + 0.2 * 10) / 10);
        console.log((0.1 + 0.2).toFixed(1));

    </script>
</body>

</html>
