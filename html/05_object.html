<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /* 객체 
            - 파이썬의 딕셔너리와 유사
            - 관련있는 데이터를 하나로 담기 위해 사용
            - {} 
            - { 키(key) : 값(value) }
            - 키 값은 유일하다.  
            - 키 값은 문자열이다. 
            - 값 : 문자열, 숫자, null, boolean, [](배열), {}(객체) ...
            - 순서가 반드시 유지되지는 않는다. (그러나 ES6 이후 가급적 유지하려고 노력한다.)

            = 차이 
            파이썬은 키에 숫자가 올 수 있다. (js는 숫자 안됌.)
        */

        let student = {
            name: "오세영",
            age: "16살",
            phone: "010-1234-5678",
            address: "서울"
        };

        console.log(student.name);

        // 1. 키에 숫자가 올 수 없다.
        let person = {
            111: "모두 1",
            222: "모두 2"
        };
        console.log(person);
        //console.log(person.111) Uncaught SyntaxError: missing ) after argument list (at 05_object.html:37:21)

        // 2. 키 값을 가져오는 함수 : Object.keys()
        let keys = Object.keys(person);
        console.log(keys);
        console.log(keys[0]);

        // 3. 값을 가져오기 : 객체명.키 
        let name = person.name;
        console.log(name); // 이 두 name은 다르다. 

        // 4. 객체의 값 변경 : 객체명.키 = 값
        student.name = "530";
        console.log(student.name);

        // 5. 객체의 새로운 키와 값 추가 : 객체명.키 = 값
        student.bloodType = "O";
        console.log(student.bloodType);

        // 6. 객체를 생성하는 다른 방법 

        let person2 = {}; // 빈 객체를 생성 후, 사용하는 시점에 추가 
        person2.name = "ㅇㅇㅇ";
        person2.age = 530;

        // 7. Object의 특정 키에 접근하는 방법 (중요)
        // 객체 이름 ["키"]
        // (클라이언트가 객체의 어떤 값을 찾고 싶은지 몰라서 입력을 받아야 할 때)
        console.log(student.bloodType);
        console.log(student["bloodType"]); // 현업에서는 이것을 선호 

        let userInputKey = prompt("객체의 어떤 정보를 찾고 싶은 건가요?", Object.keys(student));
        console.log(userInputKey, ":", student[userInputKey]);

        // CRUD - Create Read Update Delete 
    </script>
</body>

</html>
