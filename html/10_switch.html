<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /* switch 
        - Date() 객체 : 날짜와 시간을 다루는 객체 
        */
        const now = new Date();
        console.log(now);
        // getDay: 요일을 가져온다. ( 숫자 형식으로 가져오며 일, 월, 화, ... 순으로 0, 1, 2, ... 이다. )
        let d = now.getDay();
        console.log(d);

        // switch로 요일을 출력하는 코드
        let dayName = new Date; let day;
        switch (dayName.getDay()) {
            case 1:
                day = "월";
                break;
            case 2:
                day = "화";
                break
            case 3:
                day = "수";
                break;
            case 4:
                day = "목";
                break;
            case 5:
                day = "금";
                break;
            case 6:
                day = "토";
                break;
            default:
                day = "일";
        }
        console.log(`오늘은 ${day}요일입니다.`);
        //console.log("오늘은", day + "요일입니다.");

        let day_7 = ['일', '월', '화', '수', '목', '금', '토'];
        console.log(day_7[new Date().getDay()]);

        console.log((new Date).getDay());
    </script>
</body>

</html>
