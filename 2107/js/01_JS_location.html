<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자바스크립트의 삽입 위치</title>
    <script>
    
        window.document.write("Hellow world -3");
    </script>
</head>
<body>
    <!--자바스크립트의 삽입 
    1. </head> => 3
    2. </body> => 2 => 가장 마지막
    3.  외부파일로 삽입 => 1
    4. 인라인(inline)=> 비추천 => 4
    -->
    <p> Hello World - 1</p>
    <h2>Hello world - 2</h2>
    <script>
    document.writeln("Hellow world -3");
</script>
<br />
<script src="./js/01_js_location.js"></script>
</body>
</html>
