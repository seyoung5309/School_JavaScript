<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       let inputAge = +prompt("나이를 입력하세요 : ");
        if(inputAge){
            if (inputAge >= 18 && inputAge < 70){
                console.log("1000원");
            } else if (inputAge >= 12 && inputAge < 18){
                console.log("700원");
            } else if (inputAge >= 6 && inputAge < 12){
                console.log("450원");
            } else if (inputAge < 6 ||  inputAge >= 70){
                console.log("무료")
            }
        } else {
            console.log("새로고침을 한 후, 다시 나이를 입력해주세요.")
        }
    </script>
</body>
</html>
