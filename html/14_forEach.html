<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /* forEach : 
            - 배열에서 많이 사용
            - forEach(함수): 함수가 매개변수로 오는 메서드 
        */

        let brands = ["애플", "구글", "마이크로소프트", "삼성", "아마존", "테슬라"];

        brands.forEach(function(brand, index) { // 선언 함수, index는 뒤에 와야 한다. 
            console.log(brand, index);
        });

        // 활용 
        const myScores = [80, 90, 100];
        let total = 0;
        myScores.forEach(function(score) {
            total += score;
        })
        console.log(total);
        console.log(total/myScores.length);

        // 선언 함수
        myScores.forEach(function(score) {

        });

        // 화살표 함수
        myScores.forEach((score) => {

        });
    </script>
</body>
</html>
