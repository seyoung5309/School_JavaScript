<!DOCTYPE html>

<body>

    <script>
        /*
        변수 선언 - 데이터 타입 선언 X, var, let, const
        1. var
        - ES6이전부터
        - 재선언, 재할당 가능
        - 전역변수에 사용 => 권장 X (덮어쓰기)
        - 
        */
       var studentName = "2학년 1반";
       console.log(studentName);
       var studentName = "2학년 3반";
       console.log(studentName);
       var studentName = "2학년 2반";
       console.log(studentName);

       var x = 8;
       var y = 9;
       var z = x + y;
       console.log ("Z :", z);

       var x = 10; //재선언
       var y = 11; //재할당
       var z = x - y; //재할당
       console.log ("Z :", z);
    </script>

    <script>
          /*
            2. let
            -ES6이후 등장
            -재선언 불가능, 재할당 가능 => 가능
            -동일한명을 다른 곳에서 사용 불가
          */

        let y1 = 11;
        let z1 = x1 + y1;

        //let x1 = 9; 재선언 불가 => syntax error

        x1 = 26;
        z1 = x1 + y1;

    </script>

    <script>
        /*
            3. const
            - ES6이후 등장
            - 변하지 않는 상수값 => 대문자
            - 재선언, 재할당 불가
            - 현업 => 사이트 개발 중 날짜 똑같은 형식으로 보일 것 팀에서 결정 우리 사이트? 날짜 정보를 한국 - YYYY.MM.DD 로 줄 것 미국 - DD.MM.YYYY 콘스트 사용 사유 (약속을 지키기 위해)
          */

        //PI = 3;

    </script>
