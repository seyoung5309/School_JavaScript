    <script>
        // for ~ in : 객체에서 많이 사용, 배열에서 사용할 경우 다음과 같은 조건문과 초기화, 증가문이 없어도 문장을 전부 순회한다. 

        // 1. 배열에서 사용
        let brands = ["애플", "구글", "마이크로소프트", "삼성", "아마존", "테슬라"];
        for (const i in brands) {
            console.log(i);
            console.log(brands[i]);
        }

        // 2. 객체에서 사용
        // let person = {

        //     tel : "010-0000-1111",
        //     city : "Seoul",
        // };

        // for (const key in person) {

        // for (const key in person) {

        // }

        // 알고 싶은 키를 입력받고, 키에 대한 값을 출력하는 코드
        let person = {
            name : "홍길동",
            age : 22,
            tel : "010-0000-1111",
            city : "Seoul",
        };

        
        let input = prompt("키를 입력하세요: ");
        let check = 0;
        if (!input) {
            console.log("입력값이 없습니다.");
        } else {
            for (const key in person) {
                if (key === input) {
                    check = 1;
                }
            }        
            if (check) {
                console.log(input, ":", person[input]);
            } else {
                console.log(input, "키가 없습니다.");
            }
        }
    </script>
