<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. 문자열(String)
        let name1 = "2학년 1반";
        let name2 = '2학년 1반';

        let str1 = "너희는 '2학년 1반'이야."
        console.log(str1);

        let str2 = '너희는 "2학년 1반"이야';
        console.log(str2);

        let str3 = "너희는 \"2학년 1반\"이야."; // escape 문자 
        console.log(str3);

        // 문자열 합치기 
        let first_name = "John";
        let last_name = "Bacon";
        let full_name = first_name + last_name;
        console.log(full_name);

        /* 숫자형(Number 객체)
        - 정수, 실수, 0 다 포함...
        - 다양한 속성과 함수 (메서드)가 제공됨
        - 특징 : 다른 언어와 달리 64비트 부동소수점 형식을 사용한다. => 연산 시 오류가 발생 가능함.
        */

        let num1 = 13;
        let num2 = 13.8;
        let result = 0.1 + 0.2;
        if (result === 0.3) {
            console.log("정답");
        } else {
            console.log("오답");
        }

        // max_value는 단순히 최대치, safe는 정밀도 문제를 해결할 수 있는 범위 내에서 최대치
        console.log(Number.MAX_VALUE); // 1.7976931348623157e+308 -> e+308 : 10의 308제곱
        console.log(Number.MAX_SAFE_INTEGER); // 9007199254740991
        console.log(Number.MIN_VALUE); // 5e-324
        console.log(Number.MIN_SAFE_INTEGER); // -9007199254740991

        // 64bit 부동소수점 방식
        // 부호: 1, 지수부: 11(127을 더해야 한다.=> 127 + 지수), 가수부(소수부): 52

        console.log(result); // 정밀도 오차 

        /* 정밀도 오차 해결 방법 
            1. 정수로 변환 후 게산 : (0.1 * 10 + 0.2 * 10) / 10;
            2. toFixed() 사용 : (0.1 + 0.2).toFixed(1);
            3. 다양한 라이브러리 사용 (현업) : BigInt();
        */

        console.log((0.1 * 10 + 0.2 * 10) / 10);
        console.log((0.1 + 0.2).toFixed(1));

        // 3. Boolean (true/false)
        let userInputAge = 17;
        let adultAge = 20;
        let isAdult = userInputAge >= adultAge;
        console.log(isAdult);

        /* 4. undefiend(중요) 
            - 데이터 타입이자 데이터 값
            - 정의되지 않은, 값을 할당하지 않은 객체
            - 할당을 하지 않은 개발자의 실수가 있는 경우, 실행 단계에서 브라우저 엔진이 자동으로 할당하는 값
            - 따라서 개발 단계에서 수시로 개발자 도구로 undefined가 발생하는지 체크해야 한다. 
        */

        let a;
        console.log(a);

        /* 5. unll(중요)
            - 없음을 의미하는 데이터 타입
            - 실수가 아닌 개발자가 임의로 설정한 경우가 많다. 
            - 선언 시점에는 어떤 값이나 어떤 데이터 타입이 올지 정해지지 않은 경우
            - Garbage Collection (가비지 컬렉션: 더 이상 사용하지 않는 데이터를 메모리에서 삭제하는 기능)
        */

        let jsonData = "굉장히 큰 데이터";
        // 처리 완료
        jsonData = null;
        console.log(jsonData);
    </script>
</body>

</html>
