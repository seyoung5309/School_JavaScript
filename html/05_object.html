<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /* 객체 
            - 파이썬의 딕셔너리와 유사
            - 관련있는 데이터를 하나로 담기 위해 사용
            - {} 
            - { 키(key) : 값(value) }
            - 키 값은 유일하다.  
            - 키 값은 문자열이다. 
            - 값 : 문자열, 숫자, null, boolean, [](배열), {}(객체) ...

            = 차이 
            파이썬은 키에 숫자가 올 수 있다. (js는 숫자 안됌.)
        */

        let student = {
            name: "오세영",
            age: "16살",
            phone: "010-1234-5678",
            address: "서울"
        };

        console.log(student.name);

        // 1. 키에 숫자가 올 수 없다.
        let person = {
            111: "모두 1",
            222: "모두 2"
        };
        console.log(person);
        //console.log(person.111) Uncaught SyntaxError: missing ) after argument list (at 05_object.html:37:21)

        // 2. 키 값을 가져오는 함수 : Object.keys()
        let keys = Object.keys(person);
        console.log(keys);
        console.log(keys[0]);

        let name = person.name;
        console.log(name); // 이 두 name은 다르다. 
    </script>
</body>

</html>
