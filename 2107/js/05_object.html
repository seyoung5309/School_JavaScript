<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script> 
        /*
    - 파이썬의 딕셔너리와 유사
    - 관련있는 데이터를 하나로 담기 위해 사용
    - {}
    - { 키 (key) : 값(value) }
    - 키 값은 유일하다.
    - 키 값은 문자열이다. 
    - 값 : 문자열, 숫자, null, boolean, [], {}...
    - 순서가 반드시 유지 되는 것은 아니다. (그러나 ES6이후 가급적 유지하려고 노력한다.)
    */

    let student = { 
        name : "이보미", 
        age : 16, 
        phone : "010-8461-3954", 
        address : "전남 무안군"
    };
    console.log(student);
    //1. 키에 숫자가 올 수 없다. 
    
    let person = { 
        111: "모두 1",
        222: "모두 2"
    };
    console.log(person);
    //2. 키 값을 가져오는 함수 : Object.Key()
    let keys = Object.keys(person);
    console.log(keys);
    console.log(keys[0]);

    //3. 값을 가져오기 : 객체명.키
    let name = student.name; //let뒤의 name : 변수명, 뒤에 있는 것 : 키명 -> 변수 scpoe (범위)
    console.log(name);

    //4. 객체의 값 변경 - 객체명.키 : 값
    student.name = "강하늘";
    
    //5. 객체에 새로운 키와 값 추가 - 객체명.키 : 값
    student.bloodyType = "AB";
    console.log(student);

    //6. 객체를 생성하는 다른 방법
    let person2 = {};
    person2.name = "유재석";
    person2.age = 50;

    //7. Object의 특정 키에 접근하는 방법 (***중요***)
    //객체이름 ["키"] => 현업 : 유저가 객체의 어떤 키를 알고싶은지 모를 때 사용
    console.log(student.bloodyType);
    console.log(student["bloodyType"]); //현업사용

    let userInputKey = prompt("알고 싶은 정보 (name, age, phone, address, bloodType): ");
    console.log(userInputKey, " : ", student[userInputKey]);
    </script>
</body>
</html>
